<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HORUS Academy | Verificación de certificados</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at top, #1a1a1a 0%, #000000 55%, #000000 100%);
      min-height: 100vh;
      padding: 32px 20px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      color: #000;
    }

    .panel {
      background: #ffffff;
      width: min(92vw, 900px);
      border-radius: 14px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.7);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      margin-top: 8px;
      border: 1px solid #d9d9d9;
    }

    .header {
      background: #000000;
      color: #ffffff;
      text-align: center;
      padding: 24px 24px 22px;
    }

    .logo {
      width: 82px;
      margin-bottom: 8px;
      object-fit: contain;
    }

    .header h1 {
      margin: 0;
      font-size: 28px;
    }

    .header p {
      margin: 6px 0 0;
      font-size: 14px;
      opacity: 0.8;
    }

    .content {
      padding: 28px 28px 24px;
    }

    .intro {
      text-align: center;
      margin-bottom: 18px;
      font-size: 17px;
      line-height: 1.4;
    }

    .search {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    input {
      padding: 12px 14px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #000000;
      width: 380px;
      max-width: 100%;
      background: #ffffff;
      color: #000000;
    }

    button {
      padding: 12px 20px;
      background: #000000;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #222222;
    }

    .result {
      margin-top: 8px;
    }

    .valid {
      border: 2px solid #000000;
      padding: 22px;
      border-radius: 12px;
      background: #ffffff;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .seal {
      width: 96px;
      height: 96px;
      flex-shrink: 0;
    }

    .seal img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .status h2 {
      margin: 0 0 6px 0;
      font-size: 26px;
    }

    .details {
      border-top: 1px solid #dddddd;
      margin-top: 12px;
    }

    .row {
      display: grid;
      grid-template-columns: 180px 1fr;
      padding: 12px 0;
      border-bottom: 1px solid #eeeeee;
      gap: 10px;
    }

    .label {
      font-weight: bold;
    }

    .footer {
      text-align: center;
      font-size: 12px;
      margin-top: 16px;
      opacity: 0.6;
    }

    .error {
      border: 2px solid #000000;
      padding: 22px;
      border-radius: 12px;
      background: #ffffff;
    }

    @media (max-width: 900px) {
      body {
        padding: 18px 12px;
      }

      .panel {
        width: 96vw;
        margin-top: 0;
      }

      .content {
        padding: 22px 18px 20px;
      }

      .row {
        grid-template-columns: 1fr;
      }

      .header h1 {
        font-size: 24px;
      }

      .intro {
        font-size: 16px;
      }

      .logo {
        width: 72px;
      }
    }

    @media print {
      body {
        background: #ffffff;
        padding: 0;
        display: block;
      }

      .panel {
        width: 210mm;
        min-height: 297mm;
        border-radius: 0;
        box-shadow: none;
        margin: 0 auto;
      }
    }
  </style>
</head>
<body>
  <div class="panel">
    <div class="header">
      <img src="logo-horus.png" class="logo" alt="Logo HORUS Academy">
      <h1>HORUS Academy</h1>
      <p>Verificación oficial de certificados</p>
    </div>

    <div class="content">
      <div class="intro">
        Ingrese el código del certificado para validar su autenticidad.
      </div>

      <div class="search">
        <input id="codigo" placeholder="Código del certificado">
        <button onclick="verificar()">Verificar</button>
      </div>

      <div id="resultado" class="result"></div>

      <div class="footer">
        Sistema oficial de validación · HORUS Academy
      </div>
    </div>
  </div>

  <script>
    async function verificar() {
      const input = document.getElementById("codigo");
      const params = new URLSearchParams(window.location.search);
      const codigo = input.value.trim() || params.get("id");

      if (!codigo) {
        document.getElementById("resultado").innerHTML = `
          <div class="error">
            Ingrese un código de certificado.
          </div>
        `;
        return;
      }

      input.value = codigo;

      try {
        const data = await fetch("certificados.json", { cache: "no-store" });
        const lista = await data.json();
        const cert = lista.find(c => c.id === codigo);

        if (cert) {
          document.getElementById("resultado").innerHTML = `
            <div class="valid">
              <div class="status">
                <div class="seal">
                  <img src="validated-horus.png" alt="Validated by HORUS">
                </div>
                <div>
                  <h2>${cert.estado}</h2>
                  <div>Certificado registrado en HORUS Academy</div>
                </div>
              </div>

              <div class="details">
                <div class="row">
                  <div class="label">Empresa</div>
                  <div>${cert.empresa}</div>
                </div>
                <div class="row">
                  <div class="label">Alumno</div>
                  <div>${cert.alumno}</div>
                </div>
                <div class="row">
                  <div class="label">Curso</div>
                  <div>${cert.curso}</div>
                </div>
                <div class="row">
                  <div class="label">Fecha</div>
                  <div>${cert.fecha}</div>
                </div>
              </div>
            </div>
          `;
        } else {
          document.getElementById("resultado").innerHTML = `
            <div class="error">
              <h3>Certificado no encontrado</h3>
              <div>El código ingresado no existe en el registro oficial.</div>
            </div>
          `;
        }
      } catch (error) {
        document.getElementById("resultado").innerHTML = `
          <div class="error">
            <h3>Error de carga</h3>
            <div>No se pudo leer el archivo de certificados.</div>
          </div>
        `;
      }
    }

    window.onload = () => {
      const params = new URLSearchParams(window.location.search);
      if (params.get("id")) verificar();
    };
  </script>
</body>
</html>
