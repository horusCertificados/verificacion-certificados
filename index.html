<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HORUS Academy | Verificación de certificados</title>

<style>

body{

margin:0;
font-family:Arial, Helvetica, sans-serif;

background:
linear-gradient(rgba(0,0,0,0.65),rgba(0,0,0,0.65)),
url("equipo-horus.jpg");

background-size:auto 100%;
background-position:center bottom;
background-repeat:no-repeat;
background-color:black;

display:flex;
align-items:center;
justify-content:center;

min-height:100vh;

padding:30px;

}

.panel{

background:white;

max-width:900px;
width:100%;

border-radius:14px;

box-shadow:0 20px 60px rgba(0,0,0,0.7);

overflow:hidden;

}

.header{

background:black;
color:white;

text-align:center;

padding:35px;

}

.logo{

width:90px;
margin-bottom:10px;

}

.header h1{

margin:0;
font-size:30px;

}

.header p{

margin-top:6px;
font-size:14px;
opacity:0.8;

}

.content{

padding:40px;

}

.intro{

text-align:center;
margin-bottom:25px;
font-size:16px;

}

.search{

display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;

margin-bottom:25px;

}

input{

padding:12px;
font-size:16px;

border-radius:8px;
border:1px solid black;

width:300px;

}

button{

padding:12px 20px;

background:black;
color:white;

border:none;
border-radius:8px;

font-weight:bold;

cursor:pointer;

}

button:hover{

background:#222;

}

.result{

margin-top:15px;

}

.valid{

border:2px solid black;

padding:25px;

border-radius:12px;

}

.status{

display:flex;
align-items:center;
gap:20px;
margin-bottom:20px;

}

.seal{

width:90px;
height:90px;

border-radius:50%;

border:4px solid black;

display:flex;
align-items:center;
justify-content:center;

text-align:center;

font-weight:bold;

font-size:13px;

}

.status h2{

margin:0;
font-size:26px;

}

.details{

border-top:1px solid #ddd;
margin-top:15px;

}

.row{

display:grid;
grid-template-columns:180px 1fr;

padding:12px 0;

border-bottom:1px solid #eee;

}

.label{

font-weight:bold;

}

.footer{

text-align:center;
font-size:12px;

margin-top:20px;

opacity:0.6;

}

.error{

border:2px solid black;

padding:25px;

border-radius:12px;

}

</style>

</head>

<body>

<div class="panel">

<div class="header">

<img src="logo-horus.png" class="logo">

<h1>HORUS Academy</h1>

<p>Verificación oficial de certificados</p>

</div>

<div class="content">

<div class="intro">

Ingrese el código del certificado para validar su autenticidad.

</div>

<div class="search">

<input id="codigo" placeholder="Código del certificado">

<button onclick="verificar()">Verificar</button>

</div>

<div id="resultado" class="result"></div>

<div class="footer">

Sistema oficial de validación · HORUS Academy

</div>

</div>

</div>

<script>

async function verificar(){

const input=document.getElementById("codigo")

const params=new URLSearchParams(window.location.search)

const codigo=input.value.trim() || params.get("id")

if(!codigo){

document.getElementById("resultado").innerHTML=
`
<div class="error">
Ingrese un código de certificado.
</div>
`
return
}

input.value=codigo

const data=await fetch("certificados.json")

const lista=await data.json()

const cert=lista.find(c=>c.id===codigo)

if(cert){

document.getElementById("resultado").innerHTML=
`
<div class="valid">

<div class="status">

<div class="seal">
CERTIFICADO<br>VALIDADO
</div>

<div>
<h2>${cert.estado}</h2>
Certificado registrado en HORUS Academy
</div>

</div>

<div class="details">

<div class="row">
<div class="label">Empresa</div>
<div>${cert.empresa}</div>
</div>

<div class="row">
<div class="label">Alumno</div>
<div>${cert.alumno}</div>
</div>

<div class="row">
<div class="label">Curso</div>
<div>${cert.curso}</div>
</div>

<div class="row">
<div class="label">Fecha</div>
<div>${cert.fecha}</div>
</div>

</div>

</div>
`

}

else{

document.getElementById("resultado").innerHTML=
`
<div class="error">

<h3>Certificado no encontrado</h3>

El código ingresado no existe en el registro oficial.

</div>
`

}

}

window.onload=()=>{

const params=new URLSearchParams(window.location.search)

if(params.get("id")) verificar()

}

</script>

</body>

</html>
